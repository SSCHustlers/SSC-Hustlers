<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC Hustlers - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--neon-blue:#00d4ff;--neon-pink:#ff006e;--neon-gold:#ffd700;--dark-bg:#050a14;--card-bg:#0d1626;--card-border:#1a2a4a;--text-main:#e8f4ff;--text-muted:#7a99bb;--sidebar:72px}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--dark-bg);color:var(--text-main);font-family:'Exo 2',sans-serif;display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--card-bg);border-right:1px solid var(--card-border);display:flex;flex-direction:column;align-items:center;padding:16px 0;position:fixed;top:0;bottom:0;z-index:10}
.sidebar-logo{width:42px;height:42px;border-radius:8px;margin-bottom:28px}
.sidebar-nav{display:flex;flex-direction:column;gap:8px;flex:1}
.nav-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all .2s;color:var(--text-muted);text-decoration:none}.nav-icon:hover,.nav-icon.active{background:rgba(0,212,255,.15);color:var(--neon-blue)}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column}
.topbar{height:65px;background:rgba(5,10,20,.9);border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:9;backdrop-filter:blur(20px)}
.topbar h1{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:16px}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#0066ff);display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer}
.streak-badge{display:flex;align-items:center;gap:6px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:var(--neon-gold);padding:6px 14px;border-radius:20px;font-size:.85rem;font-weight:600}
.content{padding:28px 32px;flex:1}
.welcome-banner{background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(255,0,110,.08));border:1px solid rgba(0,212,255,.2);border-radius:16px;padding:28px;margin-bottom:28px;display:flex;justify-content:space-between;align-items:center}
.welcome-banner h2{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:6px}
.welcome-banner p{color:var(--text-muted);font-size:.9rem}
.btn-sm{padding:10px 24px;background:linear-gradient(135deg,#00d4ff,#0066ff);color:#fff;border:none;border-radius:6px;font-family:'Exo 2',sans-serif;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;font-size:.9rem}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:20px;text-align:center}
.stat-card .val{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700}
.stat-card .lbl{font-size:.8rem;color:var(--text-muted);margin-top:4px}
.blue{color:var(--neon-blue)}.pink{color:var(--neon-pink)}.gold{color:var(--neon-gold)}.green{color:#00ff88}
.section-row{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:28px}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:24px}
.card-title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.card-title a{font-size:.8rem;color:var(--neon-blue);text-decoration:none;font-family:'Exo 2',sans-serif;font-weight:400}
/* FILTER */
.filter-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--card-border);background:transparent;color:var(--text-muted);font-family:'Exo 2',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s}
.filter-tab.active,.filter-tab:hover{border-color:var(--neon-blue);color:var(--neon-blue);background:rgba(0,212,255,.08)}
/* ACTIVITY FEED */
.activity-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--card-border)}
.activity-item:last-child{border-bottom:none}
.act-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.act-info h4{font-size:.85rem;font-weight:600;margin-bottom:2px}
.act-info p{font-size:.75rem;color:var(--text-muted)}
.act-score{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;margin-left:auto;white-space:nowrap}
/* PROGRESS */
.prog-item{margin-bottom:16px}
.prog-head{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:6px}
.prog-bar{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .8s ease}
/* EMPTY STATES */
.empty-state{text-align:center;padding:40px 20px}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px}
.empty-state h3{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text-main)}
.empty-state p{font-size:.82rem;color:var(--text-muted);line-height:1.5}
/* SPINNER */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:28px;height:28px;border:2px solid rgba(0,212,255,.2);border-top-color:#00d4ff;border-radius:50%;animation:spin .8s linear infinite}
/* STAT SKELETON */
.stat-loading{opacity:.4;animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
</style>

        </div>
      </div>

      </div>
    </div>

  </div>

/* ── HELPERS ── */
function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 60) return m <= 1 ? 'just now' : `${m} min ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} hr ago`;
  const d = Math.floor(h / 24);
  return d === 1 ? 'Yesterday' : `${d} days ago`;
}

function removeStatLoading() {
  document.querySelectorAll('.stat-loading').forEach(el => el.classList.remove('stat-loading'));
}

/* ── LOAD USER STATS (real-time from Supabase) ── */
async function loadUserStats() {
  // Freshers see 0 by default — remove loading animation first
  removeStatLoading();

  if (!user.id && !user.email) {
    // Not logged in or no id — show zeros
    document.getElementById('statTests').textContent = '0';
    document.getElementById('statAccuracy').textContent = '—';
    document.getElementById('statRank').textContent = '—';
    document.getElementById('statScore').textContent = '0';
    document.getElementById('streakCount').textContent = '0';
    document.getElementById('welcomeMsg').textContent = 'Start your first test and begin your SSC journey! 🚀';
    renderSubjectProgress(null);
    renderRecentActivity(null);
    return;
  }

  try {
    // Filter by user email or user id depending on your schema
    const filterField = user.id ? 'user_id' : 'user_email';
    const filterVal  = user.id  ? user.id   : user.email;

    const { data: attempts, error } = await db
      .from('quiz_attempts')
      .select('*')
      .eq(filterField, filterVal)
      .order('created_at', { ascending: false });

    if (error || !attempts) throw error || new Error('No data');

    const total = attempts.length;

    if (total === 0) {
      // FRESHER — zero state
      document.getElementById('statTests').textContent = '0';
      document.getElementById('statAccuracy').textContent = '—';
      document.getElementById('statRank').textContent = '—';
      document.getElementById('statScore').textContent = '0';
      document.getElementById('streakCount').textContent = '0';
      document.getElementById('welcomeMsg').innerHTML =
        'You haven\'t attempted any test yet. <strong>Take your first test now!</strong> 🚀';
      renderSubjectProgress(null);
      renderRecentActivity(null);
      return;
    }

    // Has attempts — compute stats
    const totalScore = attempts.reduce((s, a) => s + (a.score || 0), 0);
    const avgPct = attempts.reduce((s, a) => {
      const pct = a.total_marks ? Math.round((a.score / a.total_marks) * 100) : 0;
      return s + pct;
    }, 0) / total;

    // Streak — count consecutive days from today
    const uniqueDays = [...new Set(attempts.map(a => new Date(a.created_at).toDateString()))];
    let streak = 0;
    let checkDate = new Date();
    checkDate.setHours(0, 0, 0, 0);
    for (let i = 0; i < 365; i++) {
      if (uniqueDays.includes(checkDate.toDateString())) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else {
        break;
      }
    }

    document.getElementById('statTests').textContent = total;
    document.getElementById('statAccuracy').textContent = Math.round(avgPct) + '%';
    document.getElementById('statScore').textContent = totalScore.toLocaleString('en-IN');
    document.getElementById('streakCount').textContent = streak;

    // Rank — count users with higher total score
    const { count: rankPos } = await db
      .from('quiz_attempts')
      .select('user_id', { count: 'exact', head: true })
      .neq(filterField, filterVal);
    document.getElementById('statRank').textContent = '#' + ((rankPos || 0) + 1);

    // Welcome message
    const newTests = await countNewTests();
    document.getElementById('welcomeMsg').innerHTML =
      total > 0
        ? `You've attempted <strong>${total} tests</strong>. ${newTests > 0 ? `<strong>${newTests} new tests</strong> are live for you!` : 'Keep up the momentum!'}`
        : 'Start your SSC journey today! 🚀';

    renderSubjectProgress(attempts);
    renderRecentActivity(attempts.slice(0, 4));

  } catch (err) {
    console.warn('Stats load error:', err);
    // Fallback zeros — safe for freshers
    document.getElementById('statTests').textContent = '0';
    document.getElementById('statAccuracy').textContent = '—';
    document.getElementById('statRank').textContent = '—';
    document.getElementById('statScore').textContent = '0';
    document.getElementById('streakCount').textContent = '0';
    document.getElementById('welcomeMsg').textContent = 'Start your first test now! 🚀';
    renderSubjectProgress(null);
    renderRecentActivity(null);
  }
}

async function countNewTests() {
  try {
    const { count } = await db
      .from('quizzes')
      .select('id', { count: 'exact', head: true })
      .eq('status', 'Live');
    return count || 0;
  } catch { return 0; }
}

/* ── SUBJECT PROGRESS ── */
function renderSubjectProgress(attempts) {
  const el = document.getElementById('subjectProgress');

  const subjects = [
    { name: 'General Awareness', key: 'GA',  color: 'linear-gradient(90deg,#00d4ff,#0066ff)' },
    { name: 'Quantitative Aptitude', key: 'Quant', color: 'linear-gradient(90deg,#ffd700,#ff8800)' },
    { name: 'English Language', key: 'English', color: 'linear-gradient(90deg,#00ff88,#00aa55)' },
    { name: 'General Intelligence', key: 'GI',    color: 'linear-gradient(90deg,#ff006e,#aa0044)' },
    { name: 'Reasoning', key: 'Reasoning',         color: 'linear-gradient(90deg,#00d4ff,#0066ff)' },
  ];

  if (!attempts || attempts.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="icon">📊</div>
        <h3>No progress yet</h3>
        <p>Attempt tests to see your<br>subject-wise progress here.</p>
      </div>`;
    return;
  }

  // Compute per-subject accuracy from attempts that carry a 'subject' or 'category' field
  const subjectMap = {};
  attempts.forEach(a => {
    const subj = a.subject || a.category || null;
    if (!subj) return;
    if (!subjectMap[subj]) subjectMap[subj] = { score: 0, marks: 0, count: 0 };
    subjectMap[subj].score += (a.score || 0);
    subjectMap[subj].marks += (a.total_marks || 0);
    subjectMap[subj].count++;
  });

  el.innerHTML = subjects.map(s => {
    // Match subject by key substring
    const match = Object.keys(subjectMap).find(k => k.toLowerCase().includes(s.key.toLowerCase()));
    const pct = match && subjectMap[match].marks > 0
      ? Math.round((subjectMap[match].score / subjectMap[match].marks) * 100)
      : 0;
    const colorClass = pct >= 70 ? 'green' : pct >= 50 ? 'blue' : 'pink';
    return `
      <div class="prog-item">
        <div class="prog-head">
          <span>${s.name}</span>
          <span class="${colorClass}">${pct > 0 ? pct + '%' : '—'}</span>
        </div>
        <div class="prog-bar">
          <div class="prog-fill" style="width:${pct}%;background:${s.color}"></div>
        </div>
      </div>`;
  }).join('');
}

/* ── RECENT ACTIVITY ── */
function renderRecentActivity(attempts) {
  const el = document.getElementById('recentActivity');

  if (!attempts || attempts.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="icon">⚡</div>
        <h3>No activity yet</h3>
        <p>Your test attempts will<br>appear here in real time.</p>
      </div>`;
    return;
  }

  const icons = ['📝','🏆','⚡','📖','🎯'];
  const bgColors = [
    'rgba(0,212,255,.1)','rgba(255,215,0,.1)','rgba(255,0,110,.1)',
    'rgba(0,255,136,.1)','rgba(139,92,246,.1)'
  ];

  el.innerHTML = attempts.map((a, i) => {
    const title = a.quiz_title || a.title || 'Test Attempt';
    const score = a.score != null
      ? `${a.score}${a.total_marks ? '/' + a.total_marks : ''}`
      : '—';
    const pct = a.score && a.total_marks ? Math.round((a.score / a.total_marks) * 100) : null;
    const scoreColor = pct == null ? 'blue' : pct >= 70 ? 'green' : pct >= 50 ? 'blue' : 'pink';
    return `
      <div class="activity-item">
        <div class="act-icon" style="background:${bgColors[i % bgColors.length]}">${icons[i % icons.length]}</div>
        <div class="act-info">
          <h4>${title}</h4>
          <p>${timeAgo(a.created_at)}</p>
        </div>
        <div class="act-score ${scoreColor}">${score}</div>
      </div>`;
  }).join('');
}

/* ── LIVE QUIZZES from Supabase ── */
async function loadLiveQuizzes(category) {
  const grid = document.getElementById('testsGrid');
  if (!grid) return;

  grid.innerHTML = `
    <div style="grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--text-muted)">
      <div class="spinner"></div>
      <p style="margin-top:16px;font-size:.85rem">Loading tests...</p>
    </div>`;

  try {
    let query = db.from('quizzes').select('*').eq('status', 'Live').order('created_at', { ascending: false });

    // Handle category filter
    const cat = (category || 'All').trim();
    if (cat !== 'All' && cat !== 'All Tests') {
      if (cat === 'Free') {
        query = query.eq('availability', 'Free');
      } else {
        query = query.ilike('category', `%${cat}%`);
      }
    }

    const { data, error } = await query;
    if (error) throw error;

    if (!data || data.length === 0) {
      grid.innerHTML = `
        <div style="grid-column:1/-1">
          <div class="empty-state">
            <div class="icon">📝</div>
            <h3>No tests available${cat !== 'All' ? ' in ' + cat : ''}</h3>
            <p>Admin panel se quizzes add karo!<br>Live tests yahan automatically dikhenge.</p>
          </div>
        </div>`;
      return;
    }

    const diffColors = { Easy: '#00ff88', Medium: 'var(--neon-blue)', Hard: 'var(--neon-pink)' };
    grid.innerHTML = data.map(q => `
      <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;
                  padding:20px;transition:all .25s;cursor:pointer;display:flex;flex-direction:column;gap:8px"
           onclick="window.location.href='quiz.html?quiz_id=${q.id}'"
           onmouseover="this.style.borderColor='rgba(0,212,255,.45)';this.style.transform='translateY(-3px)';this.style.boxShadow='0 8px 24px rgba(0,212,255,.12)'"
           onmouseout="this.style.borderColor='var(--card-border)';this.style.transform='none';this.style.boxShadow='none'">

        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <span style="font-size:.7rem;color:var(--text-muted);background:rgba(255,255,255,.03);
                       border:1px solid var(--card-border);padding:3px 10px;border-radius:4px">${q.category || 'General'}</span>
          <span style="font-size:.7rem;color:${diffColors[q.difficulty] || 'var(--neon-blue)'};
                       background:rgba(0,212,255,.05);padding:3px 10px;border-radius:4px">${q.difficulty || 'Medium'}</span>
        </div>

        <div style="font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;line-height:1.3">${q.title}</div>

        <div style="display:flex;gap:14px;font-size:.78rem;color:var(--text-muted)">
          <span>⏱ ${q.duration_minutes || '—'} min</span>
          <span>❓ ${q.total_questions || '—'} Qs</span>
          <span>👥 ${q.attempts_count || 0}</span>
        </div>

        <div style="margin-top:auto;padding-top:12px;border-top:1px solid var(--card-border);
                    display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:.75rem;color:${q.availability === 'Free' ? '#00ff88' : 'var(--neon-gold)'}">
            🎫 ${q.availability || 'Free'}
          </span>
          <button style="padding:6px 18px;background:linear-gradient(135deg,#00d4ff,#0066ff);border:none;
                         border-radius:6px;color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;
                         font-family:'Exo 2',sans-serif">
            Start →
          </button>
        </div>
      </div>`).join('');

  } catch (err) {
    console.error('Quiz load error:', err);
    grid.innerHTML = `
      <div style="grid-column:1/-1">
        <div class="empty-state">
          <div class="icon">⚠️</div>
          <h3>Could not load tests</h3>
          <p>Connection issue. Please refresh the page.</p>
        </div>
      </div>`;
  }
}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded', () => {
  // Load stats & activity
  loadUserStats();

  // Load all quizzes on start
  loadLiveQuizzes('All');

  // Filter tab clicks
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadLiveQuizzes(btn.dataset.filter);
    });
  });
});
</script>
